<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); color: var(--ink); }
  p { margin: 0 0 8px; max-width: 60ch; }
  .lead { font-size: 16px; font-weight: 500; }
  .sub { font-size: 14px; color: var(--muted-foreground); }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--muted-foreground); margin-top: 12px; }
</style>
</head>
<body>
  <p class="lead">Compose ta première séance en assemblant des blocs d'exercices.</p>
  <p class="sub">Tu pourras ensuite la lancer avec le minuteur — préparation, effort, repos.</p>

</body>
</html>
