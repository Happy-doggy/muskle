<!-- @dsCard group="Type" viewport="700x150" name="Mono — JetBrains Mono" subtitle="Timers & tabular numerics." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #121212; font-family: var(--font-mono); color: var(--paper); display: flex; align-items: baseline; gap: 28px; }
  .clock { font-size: 48px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .small { font-size: 18px; color: var(--phase-work); }
  .meta { font-family: var(--font-mono); font-size: 12px; color: #8C8C8C; }
</style>
</head>
<body>
  <span class="clock">1:30</span>
  <span class="clock">30</span>
  <span class="small">12 reps × 4</span>
  <span class="meta">JetBrains Mono · --font-mono · tabular-nums</span>
</body>
</html>
