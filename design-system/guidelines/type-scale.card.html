<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="From page heading down to meta labels." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--background); color: var(--ink); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); width: 120px; flex-shrink: 0; }
  .sample { font-family: var(--font-display); letter-spacing: -0.02em; }
</style>
</head>
<body>
  <div class="line"><span class="label">3xl / 30px</span><span class="sample" style="font-size: 30px;">Séances</span></div>
  <div class="line"><span class="label">2xl / 24px</span><span class="sample" style="font-size: 24px;">Gainage de base</span></div>
  <div class="line"><span class="label">base / 16px</span><span class="sample" style="font-family: var(--font-sans); font-weight: 500; font-size: 16px;">Squat bulgare</span></div>
  <div class="line"><span class="label">sm / 14px</span><span class="sample" style="font-family: var(--font-sans); font-size: 14px; color: var(--muted-foreground);">3 rounds · 60s repos</span></div>
  <div class="line"><span class="label">xs / 12px</span><span class="sample" style="font-family: var(--font-sans); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted-foreground);">Préparez-vous</span></div>
</body>
</html>
