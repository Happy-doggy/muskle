<!-- @dsCard group="Components" viewport="700x300" name="Forms — Input, SegmentedTabs" subtitle="Mint focus ring; the signature sliding-pill tabs." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .group { margin-bottom: 22px; }
  .group:last-child { margin-bottom: 0; }
  .glabel { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); margin-bottom: 10px; }
  .field { max-width: 340px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Label, SegmentedTabs } = window.MuskleDesignSystem_f221a0;
    function Demo() {
      const [tab, setTab] = React.useState('tous');
      const [mode, setMode] = React.useState('liste');
      return (
        <>
          <div className="group field">
            <div className="glabel">Input + Label</div>
            <Label htmlFor="ex">Nom de l'exercice</Label>
            <Input id="ex" defaultValue="Squat bulgare" />
          </div>
          <div className="group">
            <div className="glabel">SegmentedTabs — filter</div>
            <SegmentedTabs
              value={tab}
              onChange={setTab}
              segments={[
                { value: 'tous', label: 'Tous' },
                { value: 'gainage', label: 'Gainage' },
                { value: 'cuisses', label: 'Cuisses & Fessiers' },
                { value: 'dos', label: 'Dos' },
              ]}
            />
          </div>
          <div className="group">
            <div className="glabel">SegmentedTabs — fullWidth toggle</div>
            <div style={{ maxWidth: 320 }}>
              <SegmentedTabs
                fullWidth
                value={mode}
                onChange={setMode}
                segments={[
                  { value: 'liste', label: 'Liste' },
                  { value: 'circuit', label: 'Circuit' },
                ]}
              />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
